<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">Ohito</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="../home.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="../blog/blog.html">Blogs</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="../post/post.html">Posts</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Users</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <!-- Table -->
      <div class="mt-3">
        <div class="d-flex justify-content-between align-items-center my-3">
          <h5>List user</h5>
          <div>
            <button class="btn btn-primary" data-bs-target="#modalCreateUser" data-bs-toggle="modal">
              Create a user
            </button>
          </div>
        </div>

        <table id="tableUser" class="table table-bordered table-hover">
          <thead>
            <tr>
              <th scope="col">Id</th>
              <th scope="col">Name</th>
              <th scope="col">Email</th>
              <th scope="col">Action</th>
            </tr>
          </thead>

          <tbody></tbody>
        </table>
      </div>

      <!-- Modal Create -->
      <div
        class="modal fade"
        id="modalCreateUser"
        data-bs-backdrop="static"
        tabindex="-1"
        aria-labelledby="exampleModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="exampleModalLabel">Create a new user</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div>
                <label for="nameCreate" class="form-label">Name:</label>
                <input type="text" class="form-control" name="" id="nameCreate" />
              </div>
              <div>
                <label for="emailCreate" class="form-label">Email:</label>
                <input type="email" class="form-control" name="" id="emailCreate" />
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
              <button id="btnCreateUser" type="button" class="btn btn-warning">Save</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Modal Update -->
      <div
        class="modal fade"
        id="modalUpdateUser"
        data-bs-backdrop="static"
        tabindex="-1"
        aria-labelledby="exampleModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5">Update a user</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div>
                <label for="idUpdate" class="form-label">Id:</label>
                <input type="text" class="form-control" name="" id="idUpdate" disabled />
              </div>
              <div>
                <label for="nameUpdate" class="form-label">Name:</label>
                <input type="text" class="form-control" name="" id="nameUpdate" />
              </div>
              <div>
                <label for="emailUpdate" class="form-label">Email:</label>
                <input type="text" class="form-control" name="" id="emailUpdate" />
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
              <button id="btnUpdateUser" type="button" class="btn btn-warning">Save</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Toast Create -->
      <div>
        <div
          id="createUserToast"
          class="position-fixed bottom-0 end-0 m-3 toast align-items-center text-bg-success border-0"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <div class="d-flex">
            <div class="toast-body">Create user success!!!</div>
            <button
              type="button"
              class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast"
              aria-label="Close"
            ></button>
          </div>
        </div>
      </div>

      <!-- Toast Delete -->
      <div>
        <div
          id="deleteUserToast"
          class="position-fixed bottom-0 end-0 m-3 toast align-items-center text-bg-danger border-0"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <div class="d-flex">
            <div class="toast-body">Delete a user success!!!</div>
            <button
              type="button"
              class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast"
              aria-label="Close"
            ></button>
          </div>
        </div>
      </div>

      <!-- Toast Update -->
      <div>
        <div
          id="updateUserToast"
          class="position-fixed bottom-0 end-0 m-3 toast align-items-center text-bg-primary border-0"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <div class="d-flex">
            <div class="toast-body">Update a user success!!!</div>
            <button
              type="button"
              class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast"
              aria-label="Close"
            ></button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
      integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js"
      integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../../../../dist/lab/lab_10/user/user.js"></script>
  </body>
</html>
